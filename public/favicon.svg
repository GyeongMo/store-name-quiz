<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD1E8"/>
      <stop offset="50%" style="stop-color:#E8D5F5"/>
      <stop offset="100%" style="stop-color:#D1E8FF"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="256" height="256" rx="56" fill="url(#bg)"/>

  <!-- Decorative dots -->
  <circle cx="40" cy="35" r="6" fill="#FFF" opacity="0.4"/>
  <circle cx="75" cy="22" r="4" fill="#FFF" opacity="0.4"/>
  <circle cx="200" cy="28" r="5" fill="#FFF" opacity="0.4"/>
  <circle cx="225" cy="60" r="4" fill="#FFF" opacity="0.4"/>
  <circle cx="30" cy="200" r="4" fill="#FFF" opacity="0.4"/>
  <circle cx="215" cy="210" r="5" fill="#FFF" opacity="0.4"/>

  <!-- Cat ears -->
  <polygon points="86,73 72,35 114,57" fill="#FFB5C5"/>
  <polygon points="170,73 184,35 142,57" fill="#FFB5C5"/>
  <polygon points="88,69 78,43 108,59" fill="#FFDAE8"/>
  <polygon points="168,69 178,43 148,59" fill="#FFDAE8"/>

  <!-- Cat head -->
  <circle cx="128" cy="105" r="52" fill="white" opacity="0.96"/>

  <!-- Eyes -->
  <ellipse cx="110" cy="99" rx="6" ry="7" fill="#3D3D3D"/>
  <ellipse cx="146" cy="99" rx="6" ry="7" fill="#3D3D3D"/>
  <circle cx="113" cy="96" r="2.5" fill="white"/>
  <circle cx="149" cy="96" r="2.5" fill="white"/>

  <!-- Nose -->
  <polygon points="128,111 124,117 132,117" fill="#FFB5C5"/>

  <!-- Mouth -->
  <path d="M128,117 Q120,125 114,121" fill="none" stroke="#D4A0AA" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M128,117 Q136,125 142,121" fill="none" stroke="#D4A0AA" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Blush -->
  <ellipse cx="96" cy="113" rx="8" ry="5" fill="#FFD1E8" opacity="0.5"/>
  <ellipse cx="160" cy="113" rx="8" ry="5" fill="#FFD1E8" opacity="0.5"/>

  <!-- Whiskers -->
  <line x1="108" y1="115" x2="80" y2="109" stroke="#D4A0AA" stroke-width="1.2"/>
  <line x1="108" y1="119" x2="80" y2="123" stroke="#D4A0AA" stroke-width="1.2"/>
  <line x1="148" y1="115" x2="176" y2="109" stroke="#D4A0AA" stroke-width="1.2"/>
  <line x1="148" y1="119" x2="176" y2="123" stroke="#D4A0AA" stroke-width="1.2"/>

  <!-- Text (Latin fallback for SVG) -->
  <text x="128" y="210" text-anchor="middle" dominant-baseline="middle" font-size="42" font-family="Arial Black,Impact,sans-serif" font-weight="900" fill="#7B6BDB">ANI QUIZ</text>
</svg>
